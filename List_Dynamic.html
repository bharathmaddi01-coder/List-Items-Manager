<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Manager</title>
    <style>
        /* Modern CSS Reset & Variables */
        body{
            background: radial-gradient(circle at top left, #0ff2 0%, transparent 30%), radial-gradient(circle at bottom right, #ff00ff22 0%, transparent 30%), #0a0f1f;
        }
        *
        {
            padding: 0px;
            margin: 0px;
            
  
        }
        button
        {
            padding: 8px 15px;
            font-weight: 600;
            
            background: linear-gradient(45deg, #00ffff, #00bfff);
            color: #000;
            margin-right: 2px;
            border-radius: 10px;
        
        
        }
        .main
        {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
           
            
        }
        .fom
        {
            position: absolute;
            margin: 80px 550px;
            border: 1px solid black;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
             border-radius: 30px;
            

        }
        .main1
        {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
           
        }
        .pad
        {
            
             margin: 20px 10px;
             padding: 5px;
        }
        .card
        {
            background-color: #3e343416;
            display: flex;
            gap: 40px;
            margin: 20px 0px;
            color: antiquewhite;
            justify-content: space-evenly;
            align-items: center;
        }
        .card1
        {
            display: flex;
           
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
        }
       .toggle:active
        {
           transform: rotateX('45deg'); 
        }
        
        

    </style>
</head>
<body>

    <div  class="main">
        <h1 style="color: rgb(6, 197, 51);">Enter Items</h1>
        
        <!-- The list container -->
        <div id="id1" class="card1"></div>
        <button  class="toggle" onclick="disp()" >+</button>
        
        <!-- Floating Add button -->
    </div>

    <!-- Hidden form wrapped inside an overlay modal -->
  
        <div id="hid" style="display: none;" class="fom ">
           <div class="main1">
             <input class="pad" id="input" type="text" placeholder="Item Name">
            <input class="pad"  id="input1" type="number" placeholder="Quantity/Number">
            <button class="pad" class="submit-btn" onclick="func()">Submit</button>
           </div>
        </div>
   

<script>


   function disp() {
    
    
       let hid = document.getElementById("hid");
       if(hid.style.display=== "block")
       {
        hid.style.display="none";

       } 
       else
       {
           hid.style.display= "block" ;
       }// Uses flex for centering

   }

   // Closes modal if clicking outside the white box


   function func() {

       let el = document.getElementById("id1");
       let el2 = document.getElementById("input");
       let number_addition = document.getElementById("input1");

       // Basic Validation
       if (el2.value.trim() === "" || number_addition.value.trim() === "") {
           alert("Please fill out both fields.");
           return;
       }

       let obj = {
           name: el2.value,
           numb: number_addition.value
       };

       // DOM Element Creation
       let p = document.createElement('div');
       
       let first = document.createElement('h1');
        let second = document.createElement('h1');
       p.className = "card";
       p.style.borderRadius="10px";
       first.textContent=obj.name;
       second.textContent=obj.numb;

       
       
       let del = document.createElement('button');
       del.style.background="red";
       
       del.textContent = "DEL";
       
       p.append(first);
       p.append(second);
       p.append(del);
       el.append(p);
       del.addEventListener("click",()=>{del.parentElement.remove();});

       // Synchronized Delete Event
   


       // Reset Form
       el2.value = "";
       number_addition.value = "";
       document.getElementById("hid").style.display = "none";
   }
</script>
</body>
</html>
